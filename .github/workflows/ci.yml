name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supernaturalization
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d supernaturalization"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/supernaturalization
      INTERNAL_AUTH_SECRET: ci-secret

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: psql "$DATABASE_URL" -f db/schema.sql
      - run: npm run test
